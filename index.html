<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公考面试AI模拟</title>
<style>
:root {
  --bg: #0a0a1a; --card: #13132b; --card2: #1a1a3e;
  --accent: #6366f1; --accent2: #a855f7; --green: #10b981; --red: #ef4444;
  --text: #e8ecff; --sub: #8892b0; --border: rgba(99,102,241,.12);
  --shadow: 0 4px 32px rgba(0,0,0,.4); --radius: 18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
  line-height: 1.6; min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,.12), transparent),
                    radial-gradient(ellipse 40% 40% at 100% 100%, rgba(168,85,247,.06), transparent);
  background-attachment: fixed;
}

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,26,.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); padding: 0 24px;
}
.nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 54px; }
.nav-logo { display: flex; align-items: center; gap: 10px; font-size: .92em; font-weight: 700; letter-spacing: -.2px; }
.nav-logo .diamond {
  width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18px rgba(99,102,241,.35);
}
.nav-logo .diamond span { transform: rotate(-45deg); font-size: .85em; }
.nav-badge {
  font-size: .65em; padding: 4px 12px; border-radius: 20px;
  background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.2); color: #a5b4fc;
}

.hero { text-align: center; padding: 48px 24px 20px; }
.hero h1 { font-size: 1.8em; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg,#c7d2fe,#e9d5ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero p { font-size: .88em; color: var(--sub); margin-top: 6px; }

.main { max-width: 700px; margin: 0 auto; padding: 0 20px 40px; }

/* Type Pills */
.types-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
.type-btn {
  padding: 8px 16px; border-radius: 20px; font-size: .75em; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--card);
  color: var(--sub); transition: all .25s; letter-spacing: -.1px;
}
.type-btn:hover { border-color: var(--accent); color: var(--text); background: var(--card2); }
.type-btn.active { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border-color: transparent; box-shadow: 0 4px 16px rgba(99,102,241,.25); }

/* Question Card */
.q-card {
  background: var(--card); border-radius: var(--radius); padding: 28px 24px;
  border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.q-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
.q-card .q-label { font-size: .65em; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
.q-card .q-text { font-size: 1.05em; font-weight: 600; line-height: 1.8; text-align: center; }
.q-card .q-type { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: .65em; font-weight: 600; margin-top: 10px; background: rgba(99,102,241,.12); color: #a5b4fc; }

/* Mic Circle */
.mic-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 16px; }
.mic-ring {
  width: 120px; height: 120px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .4s cubic-bezier(.25,.1,.25,1);
  background: var(--card); border: 3px solid var(--border); box-shadow: var(--shadow);
  position: relative;
}
.mic-ring::after {
  content: ''; position: absolute; inset: -6px; border-radius: 50%;
  border: 2px solid transparent; transition: all .5s;
}
.mic-ring:hover { transform: scale(1.04); border-color: var(--accent); }
.mic-ring.listening {
  border-color: var(--red);
  background: rgba(239,68,68,.08);
}
.mic-ring.listening::after {
  border-color: rgba(239,68,68,.3);
  animation: micGlow 1.5s ease-in-out infinite;
}
@keyframes micGlow {
  0%,100% { inset: -6px; opacity: 1; }
  50% { inset: -18px; opacity: 0; }
}
.mic-icon { font-size: 2.6em; transition: all .3s; }
.mic-ring.listening .mic-icon { animation: micBeat .8s ease-in-out infinite; }
@keyframes micBeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); color: var(--red); } }
.mic-label { font-size: .8em; color: var(--sub); margin-top: 12px; transition: .3s; font-weight: 500; }
.mic-label.recording { color: var(--red); font-weight: 600; }
.mic-timer { font-size: 1.1em; font-weight: 700; color: var(--accent); margin-top: 4px; font-variant-numeric: tabular-nums; font-family: 'SF Mono','Consolas',monospace; }

/* Answer Box */
.answer-box {
  background: var(--card); border-radius: var(--radius); padding: 22px;
  border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px;
  min-height: 120px; font-size: .9em; line-height: 1.9; outline: none;
  transition: border-color .3s; word-break: break-word;
}
.answer-box:focus { border-color: var(--accent); }
.answer-box:empty::before { content: '你的语音回答将自动显示在这里...\a也可以手动输入或编辑'; white-space:pre; color: #4a5080; }

/* Buttons */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
.btn {
  padding: 12px 24px; border-radius: 24px; font-size: .85em; font-weight: 700;
  cursor: pointer; border: 0; transition: all .3s cubic-bezier(.25,.1,.25,1);
  display: inline-flex; align-items: center; gap: 6px; letter-spacing: -.1px;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 18px rgba(99,102,241,.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.4); }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent; border: 1px solid var(--border); color: var(--sub);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--text); background: rgba(99,102,241,.05); }

/* Feedback */
.feedback {
  background: var(--card); border-radius: var(--radius); padding: 24px;
  border: 1px solid var(--border); box-shadow: var(--shadow);
  animation: fadeUp .4s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.feedback h3 { font-size: .95em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.fb-content { font-size: .87em; line-height: 1.9; color: #c0c8e0; }
.fb-content strong { color: #fff; }
.fb-content br + strong { display: block; margin-top: 16px; }
.score-tag { display: inline-block; padding: 2px 12px; border-radius: 10px; font-weight: 700; font-size: .9em; margin: 2px; }
.score-h { background: rgba(16,185,129,.15); color: #34d399; }
.score-m { background: rgba(251,191,36,.15); color: #fbbf24; }
.score-l { background: rgba(239,68,68,.15); color: #f87171; }

/* Loading Dots */
.loading-dots { display: flex; gap: 6px; justify-content: center; padding: 30px; }
.loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: ld 1.4s infinite; }
.loading-dots span:nth-child(2) { animation-delay: .2s; } .loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes ld { 0%,60%,100% { opacity: .3; transform: scale(.8); } 30% { opacity: 1; transform: scale(1.2); } }

.footer { text-align: center; padding: 40px 20px; color: var(--sub); font-size: .65em; }

@media (max-width: 600px) {
  .hero h1 { font-size: 1.4em; }
  .mic-ring { width: 100px; height: 100px; }
  .mic-icon { font-size: 2.2em; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo"><div class="diamond"><span>🎯</span></div>公考面试AI模拟</div>
    <span class="nav-badge">AI考官 · 语音作答</span>
  </div>
</nav>

<section class="hero">
  <h1>AI 模拟公考面试</h1>
  <p>点击麦克风开始作答 · AI 实时转文字 · 提交后智能打分</p>
</section>

<div class="main">

  <div class="types-row">
    <button class="type-btn active" onclick="pickTopic('all',this)">🎲 随机出题</button>
    <button class="type-btn" onclick="pickTopic('综合分析',this)">💡 综合分析</button>
    <button class="type-btn" onclick="pickTopic('组织管理',this)">📋 组织管理</button>
    <button class="type-btn" onclick="pickTopic('应急应变',this)">⚡ 应急应变</button>
    <button class="type-btn" onclick="pickTopic('人际关系',this)">🤝 人际关系</button>
    <button class="type-btn" onclick="pickTopic('岗位匹配',this)">🎯 岗位匹配</button>
  </div>

  <div class="q-card">
    <div class="q-label">📝 面试题目</div>
    <div class="q-text" id="questionText">点击上方按钮抽取一道面试题</div>
    <div class="q-type" id="questionType" style="display:none"></div>
  </div>

  <div class="mic-wrap">
    <div class="mic-ring" id="micBtn" onclick="toggleMic()">
      <span class="mic-icon">🎤</span>
    </div>
    <div class="mic-label" id="micLabel">点击麦克风开始作答</div>
    <div class="mic-timer" id="timer" style="display:none">00:00</div>
  </div>

  <div class="answer-box" id="answerBox" contenteditable="true"></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnSubmit" onclick="submitAnswer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      提交 · AI 点评
    </button>
    <button class="btn btn-ghost" onclick="clearAnswer()">🗑️ 清空</button>
    <button class="btn btn-ghost" onclick="pickTopic('all')">🔄 换题</button>
  </div>

  <div class="feedback" id="feedbackCard" style="display:none">
    <h3>🤖 AI 考官点评</h3>
    <div class="fb-content" id="feedbackContent"></div>
  </div>

</div>

<div class="footer">AI 考官由 DeepSeek 驱动 · 仅供练习参考 · 不代表真实面试评分标准</div>

<script>
const API_KEY = 'sk-0541b3112cd44ec18041c235d380affc';
const API_URL = 'https://api.deepseek.com/chat/completions';

const QUESTIONS = {
  '综合分析': [
    '有人说"公务员是铁饭碗"，也有人说"公务员要有本领恐慌"。请谈谈你的理解。',
    '近期多地推行"数字政府"建设，但部分老年人反映办事更难了。你怎么看？',
    '基层干部常说"上面千条线，下面一根针"。请谈谈你对基层工作特点的认识。',
    '"躺平"成为网络热词，部分年轻人选择不婚不育不奋斗。你作为公务员怎么看？',
    '对于当前部分地区存在的"面子工程""形象工程"，你怎么看？应如何解决？',
  ],
  '组织管理': [
    '单位要组织一次面向群众的政策宣讲活动，领导让你负责，你怎么组织？',
    '某社区老年人较多，你要组织一次防诈骗宣传活动，请谈谈你的方案。',
    '单位要举办年度总结大会，你负责会务工作，请谈谈你的安排。',
    '领导让你负责新员工的入职培训，你会如何策划和实施？',
    '某县要举办农产品展销会，你作为负责人会怎么筹备？',
  ],
  '应急应变': [
    '你正在窗口为群众办事，突然一位老人晕倒了，周围群众开始围观，你怎么办？',
    '上级突然来检查，但分管领导不在，作为值班人员你如何处理？',
    '群众情绪激动地指责你办事效率低，你怎么办？',
    '单位组织的大型活动即将开始，主讲嘉宾堵在路上，你怎么处理？',
    '某小区居民集体投诉噪音扰民，情绪激动要上访，你作为值班人员怎么办？',
  ],
  '人际关系': [
    '你发现同事在工作中有违规操作，你会怎么做？',
    '领导安排你和关系不太好的同事一起完成一项重要任务，你怎么办？',
    '新来的领导工作风格和前任完全不同，你如何适应？',
    '同事经常把他的工作推给你，你的任务已经很重了，怎么办？',
    '你在会议上提出了不同意见，领导明显不高兴，事后你如何处理？',
  ],
  '岗位匹配': [
    '为什么选择报考公务员？你觉得自己的哪些特质适合这个岗位？',
    '请用三个关键词形容你自己，并结合报考岗位说明。',
    '如果你被录用了，五年后你希望自己成为什么样的人？',
    '你最大的缺点是什么？你打算如何克服？',
    '谈谈你做过的最有成就感的一件事，它对你胜任这个岗位有什么帮助？',
  ]
};

var currentQuestion = '', currentType = '', recognition = null, isListening = false, timerInterval = null, seconds = 0;
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var hasSpeech = !!SpeechRecognition;

if (hasSpeech) {
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN'; recognition.continuous = true; recognition.interimResults = true;
  recognition.onresult = function(e) {
    var t = ''; for (var i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('answerBox').textContent = t;
  };
  recognition.onerror = function(e) { if (e.error !== 'no-speech' && e.error !== 'aborted') { stopMic(); } };
  recognition.onend = function() { if (isListening) { try { recognition.start(); } catch(e) { stopMic(); } } };
} else {
  document.getElementById('micBtn').style.display = 'none';
  document.getElementById('micLabel').textContent = '浏览器不支持语音，请手动输入';
}

function toggleMic() { if (!hasSpeech) return; isListening ? stopMic() : startMic(); }
function startMic() {
  try {
    recognition.start(); isListening = true; seconds = 0;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micLabel').textContent = '正在录音...点击停止';
    document.getElementById('micLabel').classList.add('recording');
    document.getElementById('timer').style.display = 'block';
    timerInterval = setInterval(function() {
      seconds++; var m = Math.floor(seconds/60), s = seconds%60;
      document.getElementById('timer').textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    }, 1000);
  } catch(e) { document.getElementById('micLabel').textContent = '语音启动失败'; }
}
function stopMic() {
  try { recognition.stop(); } catch(e) {}
  isListening = false; clearInterval(timerInterval);
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micLabel').textContent = '点击麦克风重新作答';
  document.getElementById('micLabel').classList.remove('recording');
  document.getElementById('timer').style.display = 'none';
}

function pickTopic(type, el) {
  stopMic();
  document.getElementById('feedbackCard').style.display = 'none';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('answerBox').textContent = '';
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('active');});
  if (el) el.classList.add('active');
  var pool, keys = Object.keys(QUESTIONS);
  if (type === 'all') { currentType = keys[Math.floor(Math.random()*keys.length)]; pool = QUESTIONS[currentType]; }
  else { currentType = type; pool = QUESTIONS[type]; }
  currentQuestion = pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('questionText').textContent = currentQuestion;
  var t = document.getElementById('questionType'); t.textContent = currentType; t.style.display = 'inline-block';
}

function clearAnswer() { stopMic(); document.getElementById('answerBox').textContent = ''; }

async function submitAnswer() {
  var answer = document.getElementById('answerBox').textContent.trim();
  if (!answer) { alert('请先点击麦克风作答，或手动输入回答'); return; }
  if (answer.length < 30) { alert('回答太短，请详细阐述（至少30字）'); return; }
  stopMic();
  var btn = document.getElementById('btnSubmit'); btn.disabled = true; btn.textContent = '⏳ AI 批改中...';
  document.getElementById('feedbackCard').style.display = 'block';
  document.getElementById('feedbackContent').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  var prompt = '你是公考面试考官，对以下回答点评。\n【题目类型】'+currentType+'\n【题目】'+currentQuestion+'\n【考生回答】'+answer+'\n从以下维度打分（满分100）：\n1.内容深度(25分) 2.逻辑结构(25分) 3.语言表达(25分) 4.实际价值(25分)\n\n输出格式：\n💡 **总分：XX分**\n📊 各维度：内容X | 逻辑X | 表达X | 价值X\n✅ 优点：（2-3个）\n⚠️ 不足：（2-3个）\n💪 建议：（3条具体可操作的改进方法）\n📝 参考答案要点：（2-3个要点）\n语气专业客观、鼓励。';

  try {
    var res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY}, body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:2000,temperature:.7}) });
    var data = await res.json(), reply = data.choices[0].message.content;
    var scMatch = reply.match(/(\d{2,3})分/), sc = scMatch ? parseInt(scMatch[1]) : 0;
    var scClass = sc >= 80 ? 'score-h' : (sc >= 60 ? 'score-m' : 'score-l');
    document.getElementById('feedbackContent').innerHTML = reply
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')
      .replace(/(\d{2,3})分/g,'<span class="score-tag '+scClass+'">$1分</span>');
  } catch(e) { document.getElementById('feedbackContent').innerHTML = '网络错误，请重试'; }
  btn.disabled = false; btn.textContent = '📤 提交 · AI 点评';
}

pickTopic('all');
</script>

</body>
</html>
