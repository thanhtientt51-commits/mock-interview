<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公考面试AI模拟</title>
<style>
:root {
  --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b;
  --accent: #5865f2; --accent2: #8b5cf6; --border: rgba(0,0,0,.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
  --shadow: 0 4px 20px rgba(0,0,0,.06);
  --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5;
}

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,245,247,.8); backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border); padding: 0 24px;
}
.nav-inner { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.nav-logo { display: flex; align-items: center; gap: 8px; font-size: .9em; font-weight: 700; letter-spacing: -.2px; }
.nav-logo .icon {
  width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: .85em;
}
.nav-badge {
  font-size: .68em; font-weight: 600; padding: 5px 12px; border-radius: 20px;
  background: #fff; border: 1px solid var(--border); color: var(--sub);
  display: flex; align-items: center; gap: 5px;
}
.nav-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #34c759; box-shadow: 0 0 6px rgba(52,199,89,.5); }

.hero { text-align: center; padding: 36px 24px 20px; }
.hero h1 { font-size: 1.5em; font-weight: 700; letter-spacing: -.5px; }
.hero p { font-size: .82em; color: var(--sub); margin-top: 4px; }

/* Main Grid */
.main { max-width: 1300px; margin: 0 auto; padding: 0 24px 40px; display: grid; grid-template-columns: 1fr 420px; gap: 20px; }

.section-title { font-size: .75em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--sub); margin-bottom: 14px; }

/* Type Cards */
.types-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.type-card {
  background: var(--card); border-radius: var(--radius); padding: 18px 16px;
  cursor: pointer; transition: all .3s cubic-bezier(.25,.1,.25,1);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 12px;
}
.type-card:hover { transform: translateY(-2px); border-color: rgba(88,101,242,.25); box-shadow: 0 12px 32px rgba(0,0,0,.08); }
.type-card:active { transform: scale(.98); }
.type-card .tc-icon {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.type-card .tc-icon svg { width: 17px; height: 17px; }
.tc-blue .tc-icon { background: #f0f4ff; } .tc-blue .tc-icon svg { color: #5865f2; stroke: #5865f2; }
.tc-purple .tc-icon { background: #f6f0ff; } .tc-purple .tc-icon svg { color: #8b5cf6; stroke: #8b5cf6; }
.tc-green .tc-icon { background: #f0fdf4; } .tc-green .tc-icon svg { color: #16a34a; stroke: #16a34a; }
.tc-amber .tc-icon { background: #fffbeb; } .tc-amber .tc-icon svg { color: #d97706; stroke: #d97706; }
.tc-red .tc-icon { background: #fef2f2; } .tc-red .tc-icon svg { color: #dc2626; stroke: #dc2626; }
.tc-teal .tc-icon { background: #f0fdfa; } .tc-teal .tc-icon svg { color: #0d9488; stroke: #0d9488; }
.type-card .tc-name { font-size: .82em; font-weight: 700; letter-spacing: -.2px; }
.type-card .tc-desc { font-size: .66em; color: var(--sub); margin-top: 1px; }
.type-card.active { border-color: var(--accent); box-shadow: 0 4px 16px rgba(88,101,242,.12); background: #fafaff; }
.type-card.active .tc-icon { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.type-card.active .tc-icon svg { color: #fff; stroke: #fff; }

@media (max-width: 900px) { .types-grid { grid-template-columns: 1fr 1fr; } }

/* Question Card */
.q-card {
  background: var(--card); border-radius: var(--radius); padding: 32px 28px;
  border: 1px solid var(--border); box-shadow: var(--shadow-sm); margin-bottom: 16px;
  min-height: 160px; display: flex; flex-direction: column; justify-content: center;
}
.q-card .q-label { font-size: .7em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.q-card .q-text { font-size: 1.15em; font-weight: 600; line-height: 1.9; }
.q-card .q-type-badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: .65em; font-weight: 600; margin-top: 8px; background: #f0f4ff; color: var(--accent); }

/* Mic */
.mic-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }
.mic-btn {
  width: 100px; height: 100px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .3s ease;
  background: linear-gradient(135deg, rgba(88,101,242,.08), rgba(139,92,246,.05));
  border: 3px solid rgba(88,101,242,.15); position: relative;
}
.mic-btn:hover { transform: scale(1.06); border-color: var(--accent); box-shadow: 0 0 30px rgba(88,101,242,.15); }
.mic-btn.listening {
  border-color: #ef4444; background: rgba(239,68,68,.06);
  animation: micGlow 2s ease-in-out infinite;
}
@keyframes micGlow { 0%,100% { box-shadow: 0 0 20px rgba(239,68,68,.1); } 50% { box-shadow: 0 0 40px rgba(239,68,68,.2); } }
.mic-btn .mic-icon { font-size: 2.4em; transition: .3s; }
.mic-btn.listening .mic-icon { animation: beat .8s ease-in-out infinite; color: #ef4444; }
@keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
.mic-label { font-size: .78em; color: var(--sub); margin-top: 8px; font-weight: 500; }
.mic-label.recording { color: #ef4444; font-weight: 600; }
.mic-timer { font-size: 1em; font-weight: 700; color: var(--accent); margin-top: 2px; font-variant-numeric: tabular-nums; }

/* Answer Box */
.answer-box {
  background: var(--card); border-radius: var(--radius); padding: 22px;
  border: 1px solid var(--border); box-shadow: var(--shadow-sm); margin-bottom: 14px;
  min-height: 260px; font-size: .92em; line-height: 1.9; outline: none;
  transition: border-color .3s;
}
.answer-box:focus { border-color: var(--accent); }
.answer-box:empty::before { content: '你的语音回答将自动显示在这里…\a也可以手动输入或编辑'; white-space:pre; color: #c0c0c8; }

/* Buttons */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.btn {
  padding: 10px 22px; border-radius: 22px; font-size: .84em; font-weight: 700;
  cursor: pointer; border: 0; transition: all .25s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 14px rgba(88,101,242,.25); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(88,101,242,.35); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.btn-ghost { background: #fff; border: 1px solid var(--border); color: var(--sub); }
.btn-ghost:hover { border-color: var(--accent); color: var(--text); }

/* Feedback Panel */
.fb-panel {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 22px;
  position: sticky; top: 68px; max-height: calc(100vh - 100px); overflow-y: auto;
}
.fb-panel h3 { font-size: .85em; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.fb-empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: .8em; }
.fb-empty .fb-icon { font-size: 2.5em; margin-bottom: 10px; display: block; }
.fb-content { font-size: .82em; line-height: 1.8; color: #444; animation: fadeUp .4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fb-content strong { color: var(--text); }
.score-tag { display: inline-block; padding: 2px 10px; border-radius: 8px; font-weight: 700; font-size: .9em; margin: 2px; }
.score-h { background: #f0fdf4; color: #16a34a; } .score-m { background: #fffbeb; color: #d97706; } .score-l { background: #fef2f2; color: #dc2626; }

.loading-dots { display: flex; gap: 5px; justify-content: center; padding: 30px; }
.loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: ld 1.4s infinite; }
.loading-dots span:nth-child(2) { animation-delay: .2s; } .loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes ld { 0%,60%,100%{opacity:.3;transform:scale(.8)} 30%{opacity:1;transform:scale(1.2)} }

.footer { text-align: center; padding: 30px; color: #b0b0b8; font-size: .65em; border-top: 1px solid var(--border); }

@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
}
</style>
</head>

  <div class="nav-inner">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="3"/></svg>

        <div class="tc-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>

        <div><div class="tc-name">岗位匹配</div><div class="tc-desc">自我认知 · 职业规划</div></div>

    <div class="q-card">

<script>
const QUESTIONS = {
  '综合分析': [
    '有人说"公务员是铁饭碗"，也有人说"公务员要有本领恐慌"。请谈谈你的理解。',
    '近期多地推行"数字政府"建设，但部分老年人反映办事更难了。你怎么看？',
    '基层干部常说"上面千条线，下面一根针"。请谈谈你对基层工作特点的认识。',
    '"躺平"成为网络热词，部分年轻人选择不结婚不生子不奋斗。你作为公务员怎么看？',
    '对于当前部分地区存在的"面子工程""形象工程"，你怎么看？',
  ],
  '组织管理': [
    '单位要组织一次面向群众的政策宣讲活动，领导让你负责，你怎么组织？',
    '某社区老年人较多，你要组织一次防诈骗宣传活动，请谈谈你的方案。',
    '单位要举办年度总结大会，你负责会务工作，请谈谈你的安排。',
    '领导让你负责新员工的入职培训，你会如何策划和实施？',
    '某县要举办农产品展销会，你作为负责人会怎么筹备？',
  ],
  '应急应变': [
    '你正在窗口为群众办事，突然一位老人晕倒了，周围群众开始围观，你怎么办？',
    '上级突然来检查，但分管领导不在，作为值班人员你如何处理？',
    '群众情绪激动地指责你办事效率低，你怎么办？',
    '单位组织的大型活动即将开始，主讲嘉宾堵在路上，你怎么处理？',
    '某小区居民集体投诉噪音扰民，情绪激动要上访，你作为值班人员怎么办？',
  ],
  '人际关系': [
    '你发现同事在工作中有违规操作，你会怎么做？',
    '领导安排你和关系不太好的同事一起完成一项重要任务，你怎么办？',
    '新来的领导工作风格和前任完全不同，你如何适应？',
    '同事经常把他的工作推给你，你的任务已经很重了，怎么办？',
    '你在会议上提出了不同意见，领导明显不高兴，事后你如何处理？',
  ],
  '岗位匹配': [
    '为什么选择报考公务员？你觉得自己的哪些特质适合这个岗位？',
    '请用三个关键词形容你自己，并结合报考岗位说明。',
    '如果你被录用了，五年后你希望自己成为什么样的人？',
    '你最大的缺点是什么？你打算如何克服？',
    '谈谈你做过的最有成就感的一件事，它对你胜任这个岗位有什么帮助？',
  ]
};

var currentQuestion = '', currentType = '', recognition = null, isListening = false, timerInterval = null, seconds = 0;
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var hasSpeech = !!SpeechRecognition;

if (hasSpeech) {
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN'; recognition.continuous = true; recognition.interimResults = true;
  recognition.onresult = function(e) {
    var t = ''; for (var i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('answerBox').textContent = t;
  };
  recognition.onerror = function(e) { if (e.error !== 'no-speech' && e.error !== 'aborted') stopMic(); };
  recognition.onend = function() { if (isListening) { try { recognition.start(); } catch(e) { stopMic(); } } };
} else {
  document.getElementById('micBtn').style.opacity = '0.4';
  document.getElementById('micLabel').textContent = '浏览器不支持语音，请手动输入';
}

function toggleMic() { if (!hasSpeech) return; isListening ? stopMic() : startMic(); }
function startMic() {
  try {
    recognition.start(); isListening = true; seconds = 0;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micLabel').textContent = '正在录音...点击停止';
    document.getElementById('micLabel').classList.add('recording');
    document.getElementById('timer').style.display = 'block';
    timerInterval = setInterval(function() {
      seconds++; var m = Math.floor(seconds/60), s = seconds%60;
      document.getElementById('timer').textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    }, 1000);
  } catch(e) { document.getElementById('micLabel').textContent = '语音启动失败'; }
}
function stopMic() {
  try { recognition.stop(); } catch(e) {}
  isListening = false; clearInterval(timerInterval);
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micLabel').textContent = '点击麦克风重新作答';
  document.getElementById('micLabel').classList.remove('recording');
  document.getElementById('timer').style.display = 'none';
}

function pickTopic(type) {
  stopMic();
  document.getElementById('fbEmpty').style.display = 'block';
  document.getElementById('feedbackContent').style.display = 'none';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('answerBox').textContent = '';
  var keys = Object.keys(QUESTIONS);
  if (type === 'all') { currentType = keys[Math.floor(Math.random()*keys.length)]; }
  else { currentType = type; }
  var pool = QUESTIONS[currentType];
  currentQuestion = pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('questionText').textContent = currentQuestion;
  var t = document.getElementById('questionType'); t.textContent = currentType; t.style.display = 'inline-block';
}

function clearAnswer() { stopMic(); document.getElementById('answerBox').textContent = ''; }

function submitAnswer() {
  var answer = document.getElementById('answerBox').textContent.trim();
  if (!answer) { alert('请先点击麦克风作答，或手动输入回答'); return; }
  if (answer.length < 20) { alert('回答太短，请详细阐述（至少20字）'); return; }
  stopMic();

  var prompt = '请作为公考面试考官，对以下回答进行专业点评。\n【题目类型】'+currentType+'\n【题目】'+currentQuestion+'\n【考生回答】'+answer+'\n请从内容深度、逻辑结构、语言表达、实际价值四个维度打分（满分100），并给出优缺点和改进建议。';

  navigator.clipboard.writeText(prompt).then(function() {
    alert('回答已复制！请粘贴到右侧豆包对话框发送，AI 将为你逐项点评。');
  }).catch(function() {
    prompt('请手动复制以下内容，粘贴到右侧豆包对话框：', prompt);
  });
}

// Event delegation for type cards
document.querySelector('.types-grid').addEventListener('click', function(e) {
  var card = e.target.closest('.type-card');
  if (!card) return;
  var topic = card.dataset.topic;
  document.querySelectorAll('.type-card').forEach(function(b){b.classList.remove('active');});
  card.classList.add('active');
  pickTopic(topic);
});

pickTopic('all');
</script>
