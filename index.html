<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公考面试AI模拟</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#86868b;--accent:#5865f2;--accent2:#8b5cf6;--border:rgba(0,0,0,.06);--shadow-sm:0 1px 3px rgba(0,0,0,.04);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
.nav{position:sticky;top:0;z-index:100;background:rgba(245,245,247,.8);backdrop-filter:saturate(180%)blur(20px);-webkit-backdrop-filter:saturate(180%)blur(20px);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.9em;font-weight:700;letter-spacing:-.2px}
.nav-logo .icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85em}
.nav-badge{font-size:.68em;font-weight:600;padding:5px 12px;border-radius:20px;background:#fff;border:1px solid var(--border);color:var(--sub);display:flex;align-items:center;gap:5px}
.hero{text-align:center;padding:20px 24px 0px}.hero h1{font-size:1.5em;font-weight:700}.hero p{font-size:.82em;color:var(--sub);margin-top:4px}
.main{max-width:1300px;margin:0 auto;padding:48px 24px 40px;display:grid;grid-template-columns:1fr 420px;gap:20px}
.grid-left{display:flex;flex-direction:column}
.grid-right{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start}
.types-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.type-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:all .3s;border:1px solid var(--border);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px}
.type-card:hover{transform:translateY(-2px);border-color:rgba(88,101,242,.25);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.type-card .tc-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.type-card .tc-icon svg{width:17px;height:17px}
.tc-blue .tc-icon{background:#f0f4ff}.tc-blue svg{color:#5865f2;stroke:#5865f2}
.tc-purple .tc-icon{background:#f6f0ff}.tc-purple svg{color:#8b5cf6;stroke:#8b5cf6}
.tc-green .tc-icon{background:#f0fdf4}.tc-green svg{color:#16a34a;stroke:#16a34a}
.tc-amber .tc-icon{background:#fffbeb}.tc-amber svg{color:#d97706;stroke:#d97706}
.tc-red .tc-icon{background:#fef2f2}.tc-red svg{color:#dc2626;stroke:#dc2626}
.tc-teal .tc-icon{background:#f0fdfa}.tc-teal svg{color:#0d9488;stroke:#0d9488}
.type-card .tc-name{font-size:.82em;font-weight:700;letter-spacing:-.2px}
.type-card .tc-desc{font-size:.66em;color:var(--sub);margin-top:1px}
.type-card.active{border-color:var(--accent);box-shadow:0 4px 16px rgba(88,101,242,.12);background:#fafaff}
.type-card.active .tc-icon{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.type-card.active svg{color:#fff;stroke:#fff}
.q-card{background:var(--card);border-radius:var(--radius);padding:32px 28px;border:1px solid var(--border);box-shadow:var(--shadow-sm);margin-bottom:16px;height:200px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none}
.q-card .q-label{font-size:.7em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.q-card .q-text{font-size:1.15em;font-weight:600;line-height:1.9}
.q-type-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:.65em;font-weight:600;margin-top:8px;background:#f0f4ff;color:var(--accent)}
.answer-box{background:var(--card);border-radius:var(--radius);padding:22px;border:1px solid var(--border);box-shadow:var(--shadow-sm);min-height:340px;max-height:340px;font-size:.92em;line-height:1.9;outline:none;overflow-y:auto;word-break:break-word;}
.answer-box:focus{border-color:var(--accent)}
.answer-box::-webkit-scrollbar,.fb-content::-webkit-scrollbar,.q-card .q-text::-webkit-scrollbar{display:none}
.answer-box,.fb-content,.q-card{-ms-overflow-style:none;scrollbar-width:none}
.answer-box:empty::before{content:'你的语音回答将自动显示在这里…\a也可以手动输入或编辑';white-space:pre;color:#c0c0c8}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.btn{padding:10px 22px;border-radius:22px;font-size:.84em;font-weight:700;cursor:pointer;border:0;transition:all .25s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(88,101,242,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(88,101,242,.35)}
.btn-primary:disabled{opacity:.4;transform:none}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--sub)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.fb-panel{position:absolute;top:0;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:8px 22px 22px;overflow:hidden;display:flex;flex-direction:column}
.fb-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;color:var(--sub);font-size:.8em}
.fb-content{flex:1;overflow-y:auto;font-size:.82em;line-height:1.8;color:#444}
.fb-content strong{color:var(--text)}
.score-tag{display:inline-block;padding:2px 10px;border-radius:8px;font-weight:700;font-size:.9em;margin:2px}
.score-h{background:#f0fdf4;color:#16a34a}.score-m{background:#fffbeb;color:#d97706}.score-l{background:#fef2f2;color:#dc2626}
.loading-dots{display:flex;gap:5px;justify-content:center;padding:30px}
.loading-dots span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:ld 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1.2)}}
.mic-wrap{display:flex;flex-direction:column;align-items:center;margin-top:64px}
.mic-btn{width:100px;height:100px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;background:linear-gradient(135deg,rgba(88,101,242,.08),rgba(139,92,246,.05));border:3px solid rgba(88,101,242,.15)}
.mic-btn:hover{transform:scale(1.06);border-color:var(--accent);box-shadow:0 0 30px rgba(88,101,242,.15)}
.mic-btn.listening{border-color:#ef4444;background:rgba(239,68,68,.06);animation:micGlow 2s infinite}
@keyframes micGlow{0%,100%{box-shadow:0 0 20px rgba(239,68,68,.1)}50%{box-shadow:0 0 40px rgba(239,68,68,.2)}}
.mic-btn.listening .mic-icon{animation:beat .8s infinite;color:#ef4444}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.mic-label{font-size:.78em;color:var(--sub);margin-top:8px;font-weight:500}
.mic-label.recording{color:#ef4444;font-weight:600}
.mic-timer{font-size:1em;font-weight:700;color:var(--accent);margin-top:2px}
.footer{text-align:center;padding:30px;color:#b0b0b8;font-size:.65em;border-top:1px solid var(--border)}
@media(max-width:900px){.main{grid-template-columns:1fr}.fb-panel{position:static;min-height:400px}.types-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<nav class="nav"><div class="nav-inner"><div class="nav-logo"><div class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>公考面试AI模拟</div><div class="nav-badge">AI 智能考官</div></div></nav>



<div class="main">
  <div style="display:flex;gap:8px;margin-bottom:8px"><button class="btn btn-primary" style="border-radius:20px;padding:6px 20px;font-size:.78em">面试</button><a href="https://thanhtientt51-commits.github.io/xct/" style="text-decoration:none"><button class="btn btn-ghost" style="border-radius:20px;padding:6px 20px;font-size:.78em">行测</button></a></div><div style="display:flex;gap:8px;margin-bottom:28px;grid-column:1/-1">
      <button class="btn btn-primary" id="catGwy" onclick="switchCategory('gwy',this)" style="border-radius:20px;padding:8px 24px">公务员</button>
      <button class="btn btn-ghost" id="catSydw" onclick="switchCategory('sydw',this)" style="border-radius:20px;padding:8px 24px">事业单位</button>
    </div>
    <div class="grid-left">
    
    <div class="types-grid">
      <div class="type-card active tc-purple" data-topic="all"><div class="tc-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></div><div><div class="tc-name">随机出题</div><div class="tc-desc">系统自动分配面试题型</div></div></div>
      <div class="type-card tc-blue" data-topic="综合分析"><div class="tc-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="tc-name">综合分析</div><div class="tc-desc">观点评述 · 现象分析</div></div></div>
      <div class="type-card tc-green" data-topic="组织管理"><div class="tc-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div><div><div class="tc-name">组织管理</div><div class="tc-desc">活动策划 · 统筹协调</div></div></div>
      <div class="type-card tc-amber" data-topic="应急应变"><div class="tc-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><div><div class="tc-name">应急应变</div><div class="tc-desc">突发处置 · 危机应对</div></div></div>
      <div class="type-card tc-red" data-topic="人际关系"><div class="tc-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div><div class="tc-name">人际关系</div><div class="tc-desc">沟通协调 · 团队协作</div></div></div>
      <div class="type-card tc-teal" data-topic="岗位匹配"><div class="tc-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div><div class="tc-name">岗位匹配</div><div class="tc-desc">自我认知 · 职业规划</div></div></div>
    </div>
    <div class="q-card"><div class="q-label"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>面试题目</div><div class="q-text" id="questionText">点击上方卡片抽取一道面试题</div><span class="q-type-badge" id="questionType" style="display:none"></span></div>
    <div class="answer-box" id="answerBox" contenteditable="true"></div>
  </div>
  <div class="grid-right">
    <div class="fb-panel" id="feedbackPanel">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-ghost" style="font-size:.7em;padding:3px 10px" onclick="clearFeedback()">清空点评</button></div>
      <div class="fb-empty" id="fbEmpty"><span><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#86868b" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><p>提交回答后<br>AI考官将在这里逐项点评</p></div>
      <div class="fb-content" id="feedbackContent" style="display:none"></div>
    </div>
  </div>
</div>

<div class="main" style="display:block;padding-top:0">
  <div class="btn-row">
    <button class="btn btn-primary" id="btnSubmit" onclick="submitAnswer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>提交 · AI 点评</button>
    <button class="btn btn-ghost" onclick="clearAnswer()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>清空</button>
    <button class="btn btn-ghost" onclick="pickTopic('all')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>换题</button>
  </div>
  <div class="mic-wrap"><div class="mic-btn" id="micBtn" onclick="toggleMic()"><span class="mic-icon" style="display:flex"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span></div><div class="mic-label" id="micLabel">点击麦克风开始作答</div><div class="mic-timer" id="timer" style="display:none">00:00</div></div>
</div>
